name: CI

on:
  push:
  pull_request:
  workflow_dispatch: # CDP 스모크를 손으로 돌릴 때 (Actions 탭 → Run workflow)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # 포터블 .exe 생성 — 테스트 통과 후에만. electron-builder가 better-sqlite3를 Electron(win)용으로 리빌드.
  package-win:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: DueLedger-portable-exe
          # 배포용 3종 전부 — 포터블/설치본(.exe) + 폴더 zip(Defender 오탐 회피 권장본)
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

  # CDP UI 스모크 — 실제 Electron 앱을 헤드리스(Xvfb)로 띄워 클릭/입력 흐름 검증.
  # GUI라 느리고 이따금 흔들려서 매 push엔 안 돌리고, 수동(workflow_dispatch)·태그(v*)에서만.
  smoke:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      DUELEDGER_NO_SANDBOX: '1' # CI 크로미움 SUID 샌드박스 비활성 (main이 env 있을 때만 적용)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # npm ci가 electron 바이너리 다운로드를 건너뛸 때가 있음 → 명시적으로 받아둔다(없으면 electron-vite가 "Electron uninstall"로 실패).
      - run: node node_modules/electron/install.js
      # 앱 실행용 = better-sqlite3를 Electron ABI로 (npm ci는 Node ABI라 그대로면 앱에서 크래시)
      - run: npx @electron/rebuild -f -w better-sqlite3
      # Electron/Chromium 런타임 라이브러리 + 가상 디스플레이(Xvfb)
      - run: sudo apt-get update && sudo apt-get install -y xvfb libnss3 libgbm1 libasound2t64 libgtk-3-0
      # 빈 DB(새 러너라 ~/.config/dueledger 비어 있음)에서 앱을 띄우고 포트 9222 대기 후 스모크 실행
      - name: Run CDP smoke under Xvfb
        run: |
          xvfb-run -a bash -c '
            DUELEDGER_REMOTE_DEBUG=1 npm run dev &
            for i in $(seq 1 60); do
              curl -sf http://localhost:9222/json >/dev/null && break
              sleep 1
            done
            node scripts/cdp-smoke.mjs
          '
