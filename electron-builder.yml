appId: com.dueledger.app
productName: DueLedger
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
  - build/icon.ico   # 런타임 창/작업표시줄 아이콘 (BrowserWindow icon이 asar에서 읽음)
# better-sqlite3는 네이티브(.node)라 asar 안에서 로드 불가 → 언팩 (P0 #5 데이터 게이트가 실제 동작하려면 필수)
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
# 단일 사용자 포터블 .exe (설치 마법사 없음, 더블클릭). 미서명 → 첫 실행 시 윈도우 경고 1회.
# 아이콘 = build/icon.ico (buildResources 관례 — .exe 파일 아이콘으로 자동 임베드).
win:
  icon: build/icon.ico
  target:
    - portable
    - nsis
    - zip
  # zip은 전용 config 섹션이 없어 win 레벨 artifactName이 기본값으로 적용됨(portable/nsis는 각자 override).
  # 앱 폴더 zip — 압축 파일은 다운로드 시 자동삭제를 거의 안 당함. 풀고 안의 DueLedger.exe 실행.
  artifactName: ${productName}_v${version}_win.${ext}     # DueLedger_v0.1.1_win.zip
portable:
  artifactName: ${productName}_v${version}.${ext}   # 파일명 = DueLedger_v0.1.0.exe
# 설치 마법사(.exe). 미서명이라 SmartScreen "알 수 없는 게시자" 경고 1회는 남지만,
# 단일 포터블(자가압축 실행형)보다 Defender 오탐(자동삭제)을 덜 당함.
nsis:
  oneClick: true            # 옵션 없이 바로 설치 + 바로가기 생성(1인 비기술 사용자)
  perMachine: false         # 관리자 권한 불필요(사용자 폴더 설치)
  artifactName: ${productName}_Setup_v${version}.${ext}   # DueLedger_Setup_v0.1.1.exe
# 로컬 검증용(맥) — 서명/공증 없이 언팩만
mac:
  target:
    - dir
